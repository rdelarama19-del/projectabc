name: Multi-Env Manual CI/CD Pipeline (.NET 9)

# 1. THE DROPDOWN MENU TRIGGER
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Target Environment'
        required: true
        default: 'QAT'
        type: choice
        options:
          - QAT
          - UAT
          - Production # Must match GitHub Environment

jobs:
  # =========================================
  # JOB 1: MANUAL CI (Build & Test)
  # =========================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 9 environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Setup Node.js (for React)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build -c Release --no-restore

    - name: Run Tests
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Publish Web App
      run: dotnet publish -c Release -o ./publish --no-build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build-${{ github.sha }}
        path: ./publish
        retention-days: 1 

  # =========================================
  # JOB 2: MANUAL CD (Targeted Deployment)
  # =========================================
  deploy:
    name: Deploy to ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    needs: build-and-test

    # tells GitHub to open the QAT, UAT, or Production vault
    environment: 
      name: ${{ inputs.target_env }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # Pulls the plain-text name (Variables) and hidden password (Secrets)
          app-name: ${{ vars.AZURE_APP_NAME }} 
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish