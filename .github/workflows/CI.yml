
name: 1. CI - Build & Release (.NET 9)

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 9 environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Setup Node.js (for React)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore, Build, and Publish
      run: |
        dotnet restore
        dotnet build -c Release --no-restore
        dotnet publish -c Release -o ./publish --no-build

    - name: Zip Publish Folder
      run: |
        cd ./publish
        zip -r ../app-release.zip .

    - name: Generate Automatic Release Tag
      run: |
        echo "DATE_STAMP=$(date +'%Y%m%d')" >> $GITHUB_ENV
        echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "RELEASE_TAG=release-${DATE_STAMP}-${SHORT_SHA}" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:  
    	tag_name: ${{ env.RELEASE_TAG }}
    	name: Release ${{ env.RELEASE_TAG }}
    	files: app-release.zip

