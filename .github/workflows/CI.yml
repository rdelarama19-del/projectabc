name: CI - Build & Release (.NET 9)name: CI - Build & Release:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build & Publish
      run: |
        dotnet restore
        dotnet publish -c Release -o publish

    - name: Zip Publish Folder
      run: zip -r app-release.zip publish

    - name: Generate New Release Tag
      run: |
        echo "DATE_STAMP=$(date +'%Y%m%d')" >> $GITHUB_ENV
        echo "TIME_STAMP=$(date +'%H%M%S')" >> $GITHUB_ENV
        echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "RELEASE_TAG=release-${DATE_STAMP}-${TIME_STAMP}-${SHORT_SHA}" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        files: app-release.zip

on:
  workflow_dispatch:

